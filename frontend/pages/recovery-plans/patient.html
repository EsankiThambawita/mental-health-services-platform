<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient - My Recovery Plans</title>
  <link rel="stylesheet" href="../../css/rec-auth-styles.css">
  <link rel="stylesheet" href="../../css/sidebar.css">
</head>
<body>
  <div class="background-gradient"></div>
  
  <div class="container">
    <div class="header">
      <div class="header-content">
        <div>
          <h1>My Recovery Plans</h1>
          <p class="subtitle">View your recovery plans and complete tasks</p>
        </div>
        <div class="user-info">
          <strong id="userName"></strong>
          <span id="userEmail"></span>
          <br>
          <button onclick="logout()" class="btn btn-danger btn-small" style="margin-top: 8px;">Logout</button>
        </div>
      </div>
    </div>

    <div id="alert" class="hidden"></div>

    <div class="card">
      <h2>My Active Recovery Plans</h2>
      <div id="loadingPlans" class="loading hidden">Loading plans...</div>
      <div id="emptyPlans" class="empty-state hidden">
        No recovery plans assigned yet. Your counselor will create a plan for you.
      </div>
      <div id="plansContainer"></div>
    </div>
  </div>

  <script src="../../js/env.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/patient.js"></script>
</body>
</html>
