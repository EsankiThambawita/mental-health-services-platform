<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | Mental Health Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/sidebar.css">
  <link rel="stylesheet" href="../../css/404.css">
</head>
<body>

  <div class="error-page">
    <!-- Decorative background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="error-card">
      <!-- Animated emoji -->
      <div class="error-icon">
        <span class="error-emoji">🔍</span>
      </div>

      <!-- Error code -->
      <h1 class="error-code">404</h1>

      <!-- Message -->
      <h2 class="error-title">Page Not Found</h2>
      <p class="error-message">
        Sorry, the page you're looking for doesn't exist or has been moved.
        Let's get you back on track.
      </p>

      <!-- Action buttons -->
      <div class="error-actions">
        <a href="javascript:history.back()" class="btn btn-secondary">
          <span class="btn-icon">←</span>
          Go Back
        </a>
        <a href="../../pages/mood-tracking/index.html" class="btn btn-primary">
          <span class="btn-icon">🏠</span>
          Home
        </a>
      </div>

      <!-- Quick links -->
      <div class="quick-links">
        <p class="quick-links-label">Or jump to:</p>
        <div class="quick-links-list">
          <a href="../../pages/mood-tracking/index.html" class="quick-link">🧠 Mood & Resources</a>
          <a href="../../pages/availability/index.html" class="quick-link">📅 Availability</a>
          <a href="../../pages/appointments/index.html" class="quick-link">📋 Appointments</a>
          <a href="../../pages/recovery-plans/counselor.html" class="quick-link">📝 Recovery Plans</a>
        </div>
      </div>
    </div>

    <!-- Footer note -->
    <p class="error-footer">Mental Health Services Platform</p>
  </div>

  <script src="../../js/sidebar.js"></script>
</body>
</html>
