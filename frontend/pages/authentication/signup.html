<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Mental Health Platform</title>
  <link rel="stylesheet" href="../../css/rec-auth-styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>Sign Up</h1>
      
      <div id="alert" class="hidden"></div>
      
      <form id="signupForm">
        <div class="form-group">
          <label>Name*</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
          <label>Email*</label>
          <input type="email" id="email" required placeholder="john@example.com">
        </div>
        
        <div class="form-group">
          <label>Password*</label>
          <input type="password" id="password" required placeholder="At least 6 characters">
        </div>
        
        <div class="form-group">
          <label>I am a*</label>
          <select id="role" required>
            <option value="">-- Select Role --</option>
            <option value="COUNSELOR">Counselor</option>
            <option value="PATIENT">Patient</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
      </form>
      
      <div class="auth-link">
        Already have an account? <a href="signin.html">Login</a>
      </div>
    </div>
  </div>
  
  <script src="../../js/env.js"></script>
  <script src="../../js/auth.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };
      
      await signup(data);
    });
  </script>
</body>
</html>
