<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Mental Health Platform</title>
  <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>
  <div class="container">
    <h1>Sign In</h1>

    <form id="signinForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Enter your password">
      </div>

      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>

  <script>
    const API_BASE = 'http://localhost:8081/auth';

    document.getElementById('signinForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API_BASE}/signin`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) throw new Error('Invalid email or password');

        const user = await res.json();

        // Store user in localStorage for future use
        localStorage.setItem('user', JSON.stringify(user));

        alert(`Welcome ${user.username}! Role: ${user.role}`);

        // Redirect based on role
        if (user.role === 'Counselor') {
          window.location.href = '../../counselor/dashboard.html';
        } else {
          window.location.href = '../../patient/dashboard.html';
        }

      } catch (err) {
        alert(err.message);
      }
    });
  </script>
</body>
</html>
