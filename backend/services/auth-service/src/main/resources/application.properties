# Server Configuration
server.port=8084
spring.application.name=auth-service

# MongoDB Configuration
spring.data.mongodb.uri=mongodb+srv://<username>:<password>@<cluster>.mongodb.net/auth_db?retryWrites=true&w=majority

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-make-it-long-and-random
jwt.expiration=86400000

# Logging
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.mentalhealth.auth=DEBUG

# JSON formatting
spring.jackson.serialization.indent_output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Disable default Spring Security (we'll use JWT instead)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration